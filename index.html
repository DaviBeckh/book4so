<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Book4so</title>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<style>
:root {
  --cor-primaria: #ff6f91;
  --cor-fundo-livro: #fff5f8;
  --cor-capa: #ffccd5;
  --transicao: 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
}

body.morto {
  filter: grayscale(100%) brightness(0.4) contrast(1.2);
  background: #2c2c2c !important;
}

body {
  margin: 0;
  height: 100vh;
  background: #ffd6e0; 
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Comic Sans MS', cursive, sans-serif;
  overflow: hidden;
  touch-action: manipulation;
  transition: filter 1.5s ease, background 1.5s ease;
}

.book-container {
  width: 90vw;
  max-width: 340px;
  height: 70vh;
  max-height: 480px;
  position: relative;
  perspective: 2000px;
}

.sheet {
  position: absolute;
  width: 100%;
  height: 100%;
  transform-origin: left;
  transform-style: preserve-3d;
  transition: transform var(--transicao);
}

.page {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 10px 25px 25px 10px;
  backface-visibility: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 25px;
  box-sizing: border-box;
  background: white;
  box-shadow: inset -5px 0 10px rgba(0,0,0,0.05), 5px 10px 20px rgba(0,0,0,0.1);
}

p, textarea {
  color: #555;
  font-size: 14px;
  line-height: 22px;
  text-align: justify;
  margin: 0;
  background-image: linear-gradient(transparent 21px, #f0f0f0 21px);
  background-size: 100% 22px;
  width: 100%;
  border: none;
  font-family: 'Comic Sans MS', cursive, sans-serif;
  resize: none;
  outline: none;
}

textarea {
  height: 160px;
  background-attachment: local;
}

.page::after {
  content: "";
  position: absolute;
  left: 12px;
  top: 0;
  width: 1px;
  height: 100%;
  background: rgba(0,0,0,0.06);
}

.cover-front { background: var(--cor-capa) !important; border-left: 8px solid #ffb3c1; }
.back { background: var(--cor-fundo-livro); transform: rotateY(180deg); border-radius: 25px 10px 10px 25px; }
.sheet.flipped { transform: rotateY(-180deg); }

.arrow-btn {
  position: absolute;
  font-size: 32px;
  color: var(--cor-primaria);
  background: none;
  border: none;
  cursor: pointer;
  z-index: 5;
  padding: 10px;
}

.arrow-lt { top: 10px; left: 10px; }
.arrow-lb { bottom: 10px; left: 10px; }
.arrow-rt { top: 10px; right: 10px; }
.arrow-rb { bottom: 10px; right: 10px; }

.btn-salvar {
  margin-top: 15px;
  background: var(--cor-primaria);
  color: white;
  border: none;
  padding: 10px 25px;
  border-radius: 20px;
  cursor: pointer;
}

.btn-novo {
  margin-top: 8px;
  background: #b0b0b0;
  color: #f0f0f0;
  border: none;
  padding: 6px 15px;
  border-radius: 15px;
  cursor: pointer;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="book-container">
  
  <div class="sheet" id="s0" style="z-index: 3;">
    <div class="page front cover-front">
      <span style="font-size: 45px;">📔</span>
      <h2>Oi, Sofia!</h2>
      <p style="background: none; text-align: center;">talvez seja o menor livro que vai ler</p>
    </div>
    <div class="page back"></div>
    <button class="arrow-btn arrow-rt" onclick="nextPage()">→</button>
    <button class="arrow-btn arrow-rb" onclick="nextPage()">→</button>
  </div>

  <div class="sheet" id="s1" style="z-index: 2;">
    <div class="page front">
      <p id="p3">Carregando...</p>
    </div>
    <div class="page back"></div>
    <button class="arrow-btn arrow-lt" onclick="prevPage()">←</button>
    <button class="arrow-btn arrow-lb" onclick="prevPage()">←</button>
    <button class="arrow-btn arrow-rt" onclick="nextPage()">→</button>
    <button class="arrow-btn arrow-rb" onclick="nextPage()">→</button>
  </div>

  <div class="sheet" id="s2" style="z-index: 1;">
    <div class="page front">
      <textarea id="textoResposta" placeholder="pode escrever algo se quiser"></textarea>
      <button class="btn-salvar" id="btnSave" onclick="salvarNoFirebase()">Save</button>
      <button class="btn-novo" id="btnNovo" onclick="enviarMensagemNova()">botãozinho novo</button>
    </div>
    <div class="page back"></div>
    <button class="arrow-btn arrow-lt" onclick="prevPage()">←</button>
    <button class="arrow-btn arrow-lb" onclick="prevPage()">←</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>


<script>
const firebaseConfig = {
  apiKey: "AIzaSyCKa219_gQ7_1Br1fCM-PHW3ev9AEzZZJ8",
  authDomain: "book4so.firebaseapp.com",
  databaseURL: "https://book4so-default-rtdb.firebaseio.com",
  projectId: "book4so"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// 🔥 MOSTRAR SUA MENSAGEM (MnhPG)
database.ref("respostas").on("value", (snapshot) => {
  const dados = snapshot.val();
  if (!dados) return;

  const lista = Object.keys(dados)
    .filter(id => id.startsWith("MnhPG"))
    .sort((a, b) => {
      const numA = parseInt(a.replace("MnhPG", ""));
      const numB = parseInt(b.replace("MnhPG", ""));
      return numA - numB;
    });

  if (lista.length === 0) return;

  const ultima = lista[lista.length - 1];
  const texto = dados[ultima].mensagem;

  document.getElementById("p3").innerText = texto;
});


// 💀🔥 ESTADO GLOBAL (SINCRONIZA OS DOIS SITES)
database.ref("estadoSite").on("value", (snapshot) => {
  const estado = snapshot.val();
  const btn = document.getElementById("btnNovo");

  if (estado === "morto") {
    document.body.classList.add("morto");

    if (btn) {
      btn.style.background = "#ff4d6d";
      btn.style.color = "white";
      btn.innerText = "arrepender";
    }

  } else {
    document.body.classList.remove("morto");

    if (btn) {
      btn.style.background = "#b0b0b0";
      btn.style.color = "#f0f0f0";
      btn.innerText = "botãozinho novo";
    }
  }
});


// 🎉 CONFETE
let confettiInterval = null;

function explosaoConfete() {
  confetti({ particleCount: 120, spread: 70, origin: { y: 0.6 } });
}

function chuvaConfete() {
  confettiInterval = setInterval(() => {
    confetti({ particleCount: 25, angle: 90, spread: 60, origin: { x: Math.random(), y: 0 } });
  }, 300);
}

function pararConfete() {
  clearInterval(confettiInterval);
}

// 📖 PÁGINAS
let sheets;
let current = 0;

window.onload = () => {
  sheets = document.querySelectorAll('.sheet');
};

// 👉 PRÓXIMA PÁGINA
function nextPage() {
  if (current < sheets.length - 1) {
    const sheet = document.getElementById('s' + current);
    sheet.classList.add('flipped');
    current++;

    if (current === 1) {
      explosaoConfete();
      chuvaConfete();
    }

    if (current === 2) {
      pararConfete();
    }
  }
}

// 👉 VOLTAR
function prevPage() {
  if (current > 0) {
    current--;
    const sheet = document.getElementById('s' + current);
    sheet.classList.remove('flipped');
  }
}

// 💌 ELA ESCREVE (RSofia)
function salvarNoFirebase() {
  const texto = document.getElementById('textoResposta').value;
  const btn = document.getElementById('btnSave');

  if (texto.trim() === "") {
    alert("Escreva algo antes de salvar!");
    return;
  }

  btn.innerText = "Enviando...";
  btn.disabled = true;

  const contadorRef = database.ref('contadorS');

  contadorRef.transaction((current) => {
    return (current || 0) + 1;
  }).then((result) => {
    const numero = result.snapshot.val();

    return database.ref('respostas/RSofia' + numero).set({
      mensagem: texto,
      data: new Date().toLocaleString(),
      autor: "sofia"
    });
  })
  .then(() => {
    alert("Enviado com sucesso!");
    btn.innerText = "Save";
    btn.disabled = false;
    document.getElementById('textoResposta').value = "";
  })
  .catch((erro) => {
    alert("Erro: " + erro.message);
    btn.innerText = "Save";
    btn.disabled = false;
  });
}


// 💀 BOTÃO DO CAOS (AGORA SINCRONIZADO)
function enviarMensagemNova() {
  const estadoRef = database.ref("estadoSite");

  estadoRef.get().then((snapshot) => {
    const estadoAtual = snapshot.val();

    if (estadoAtual === "morto") {
      estadoRef.set("vivo"); // 💔 desfaz
    } else {
      estadoRef.set("morto"); // 💀 ativa
    }
  });
}
</script>

</body>
</html>
